<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex TCG</title>
  <link rel="manifest" href="manifest.json">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #f6f7fb, #e3e6f0);
    margin: 0;
    padding: 20px;
    color: #222;
    transition: background 0.3s, color 0.3s;
  }

  body.dark {
    background: #121212;
    color: #eaeaea;
  }

  h1 {
    text-align: center;
    margin-bottom: 10px;
    font-size: 2rem;
  }

  h2 {
    margin-top: 10px;
    font-size: 1.1rem;
    opacity: 0.9;
  }

  .card {
    background: white;
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.06);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  body.dark .card {
    background: #1e1e1e;
  }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
  }

  .search-box {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }

  input {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: #f1f2f6;
    font-size: 16px;
  }

  body.dark input {
    background: #2a2a2a;
    color: white;
  }

  button {
    padding: 14px 18px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #ff5f6d, #ef5350);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.05s ease, filter 0.2s;
  }

  button:hover {
    filter: brightness(1.05);
  }

  button:active {
    transform: scale(0.97);
  }

  .progress-bar {
    height: 12px;
    background: #e0e0e0;
    border-radius: 999px;
    overflow: hidden;
    margin-top: 10px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(135deg, #66bb6a, #43a047);
    transition: width 0.5s ease;
  }

  body.dark .progress-bar {
    background: #333;
  }

  li {
    background: white;
    padding: 12px;
    border-radius: 14px;
    margin-bottom: 8px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.04);
    animation: fadeIn 0.2s ease;
  }

  body.dark li {
    background: #1b1b1b;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .toggle-theme {
    position: fixed;
    top: 16px;
    right: 16px;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 999px;
  }

  .capture {
    animation: pulse 0.4s ease;
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.03); }
    100% { transform: scale(1); }
  }
  .banner-image {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 16px 0;
}

.banner-image img {
  width: 100%;
  max-width: 550px;
  height: auto;
  border-radius: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  font-size: 14px;
}

th, td {
  padding: 8px;
  text-align: center;
}

th {
  background: #ef5350;
  color: white;
}

tr:nth-child(even) {
  background: #f5f5f5;
}

body.dark tr:nth-child(even) {
  background: #2a2a2a;
}

td button {
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 12px;
}

</style>



</head>

<button class="toggle-theme" onclick="toggleTheme()">🌙 Modo oscuro</button>

<h1>Pokédex TCG</h1>

<div class="banner-image">
  <img src="reunicluspiti.png" alt="Reuniclus">
</div>

<div class="card">
  <h2>📊 Progreso total</h2>
  <div id="stats"></div>
  <div class="progress-bar">
    <div id="progressFill" class="progress-fill"></div>
  </div>
</div>

<div class="card">
  <h2>📈 Progreso por generación</h2>
  <div id="genStats"></div>
</div>

<div class="card">
  <h2>📋 Colección</h2>

  <button onclick="loadTable()">Cargar colección</button>

  <table id="pokemonTable">
    <thead>
      <tr>
        <th>#</th>
        <th>Nombre</th>
        <th>Página</th>
        <th>Hueco</th>
        <th>Tengo</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>




  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script src="app.js"></script>
</body>
</html>
